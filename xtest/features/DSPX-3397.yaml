    branch: DSPX-3397-platform-go-sdk
    todo:
      - 'Add DPoP client support to the Go SDK auth layer (likely `sdk/auth/` or `sdk/oauth/`). Generate an ephemeral EC P-256 (ES256) key per SDK instance by default; accept a caller-supplied `crypto.Signer` for persistence (HSM is out of scope).'
      - 'HTTP interceptor compatible with the SDK''s HTTP client. Token endpoint: emit proof with claims `jti, htm="POST", htu=<token-endpoint>, iat`. Resource endpoints (KAS / policy / kasregistry): when the access token is DPoP-bound (`token_type=DPoP`), emit proof with added `ath = base64url(SHA-256(token))`, set `Authorization: DPoP <token>` instead of `Bearer`.'
      - 'Handle server-issued nonce: on 401 with a `DPoP-Nonce` response header, cache the nonce (per-origin), regenerate the proof with the `nonce` claim, retry once. Refresh cached nonces from successful responses too.'
      - 'Add `supports dpop` case to xtest/sdk/go/cli.sh source â€” the awk predicate should match a stable DPoP-related flag or feature string introduced by this PR.'
