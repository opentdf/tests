  platform-service:
    path: platform
    branch: DSPX-3397-platform-service
    todo:
      - 'Audit `service/pkg/auth/` (or wherever the access-token middleware lives). `enforceDPoP: false` already exists in opentdf-*.yaml plus `Dpop` listed in auth mechanisms â€” extend rather than rewrite. Reuse the DPoP key+proof helpers in `test/integration/oauth/oauth_test.go`.'
      - 'Update the middleware to accept both `Authorization: Bearer <token>` and `Authorization: DPoP <token>` schemes.'
      - 'For `DPoP` scheme, validate the proof end-to-end per RFC 9449 Â§4.3 + Â§7.1 â€” header `typ=dpop+jwt` + `alg=ES256/RS256/PS256`; jwk extraction; verify signature; `htm` matches the request method; `htu` matches the normalized URI (lowercase scheme/host, default ports stripped, query+fragment stripped per spec Â§HTTP URI Normalization); `ath = base64url(SHA-256(access_token))`; RFC 7638 JWK thumbprint matches `cnf.jkt` in the access token.'
      - 'Server-issued DPoP-Nonce challenges (RFC 9449 Â§8) â€” gated by a new config key `services.kas.dpop.require_nonce` (default false). When enabled, the middleware mints a short-lived opaque nonce, returns it via the `DPoP-Nonce` response header on every successful response *and* in 401 challenges (`use_dpop_nonce` error) when a proof arrives without the expected `nonce` claim. Validate the proof''s `nonce` claim against the active nonce window (current + previous), rotate on a configurable interval, and reject tampered/expired nonces with 401 + fresh `DPoP-Nonce`.'
      - 'For gRPC paths, map `htm: "POST"` and `htu` to the full gRPC service path (spec Â§Edge Cases). Propagate `DPoP-Nonce` via response headers/trailers.'
      - 'Verify the platform boots and authenticates against a local KC26 once the tests-cell otdf-local bump lands. Add at least one Go unit test per validation rule (signature, htm, htu, ath, jkt, nonce-current, nonce-rotated, nonce-tampered).'
      - 'Add `supports dpop` case to the platform''s policy/KAS-side feature gate so `pfs.skip_if_unsupported("dpop")` in tests sees it.'
