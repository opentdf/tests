      - 'Implement / verify the `DPoP-Nonce` 401 retry loop in the SDK''s HTTP layer (not just the OIDC client). Refresh the cached nonce from successful responses'' `DPoP-Nonce` header.'
      - 'Ensure every KAS-facing client (rewrap, policy, kasregistry â€” `lib/src/access.ts` and related) propagates DPoP headers, not only the OIDC token-exchange path.'
      - 'Add `supports dpop` case to xtest/sdk/js/cli.sh source. Coordinate the CLI flag exposure in `cli/src/cli.ts` (currently `--dpop` is wired up â€” verify and document).'
