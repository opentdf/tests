apiVersion: opentdf.io/v1alpha1
kind: Scenario
metadata:
  id: mechanism-mlkem
  title: "Pure ML-KEM-768 post-quantum key encapsulation mechanism (DSPX-2399)"
  created: "2026-05-18"
instance:
  metadata:
    name: mechanism-mlkem
  platform:
    source:
      ref: main
  ports:
    base: 8080
  kas:
    alpha:
      source:
        ref: main
      mode: standard
    km1:
      source:
        ref: main
      mode: key_management
    km2:
      source:
        ref: main
      mode: key_management
sdks:
  encrypt:
    go: { version: main }
    java: { version: main }
    js: { version: main }
  decrypt:
    go: { version: main }
    java: { version: main }
    js: { version: main }
suite:
  select: "xtest/test_pqc.py::test_mlkem768_roundtrip"
  containers: ztdf
expected: >-
  test_mlkem768_roundtrip passes for each SDK pair: the SDK encrypts a TDF
  with the mlkem:768 key assigned to the attribute, producing a KAO with
  type "wrapped" and wrappedKey containing the ML-KEM-768 ciphertext (1088 bytes)
  concatenated with the AES-wrapped DEK; no ephemeralPublicKey is present.
  Every other SDK decrypts successfully and the roundtrip file comparison passes.
actual: >-
  Feature not implemented. No supports mechanism-mlkem gate exists in any SDK
  wrapper; mlkem:768 is not yet a supported algorithm in platform or any SDK;
  tests skip uniformly (platform version gate requires >= 0.15.0 and SDK-level
  supports check fails) until platform-proto, platform-service, platform-go-sdk,
  java-sdk, and web-sdk PRs all land.
